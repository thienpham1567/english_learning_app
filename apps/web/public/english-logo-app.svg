<svg width="204" height="64" viewBox="0 0 204 64" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- ── Mark: thin circular seal ── -->
  <circle cx="32" cy="32" r="28" stroke="#c46d2e" stroke-width="1.5" fill="none"/>

  <!-- T monogram — hairline crossbar, clean stem -->
  <line x1="17" y1="22" x2="47" y2="22"
        stroke="#1c1917" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="22" x2="32" y2="44"
        stroke="#1c1917" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Accent dot at the base of the stem — ink drop / serif detail -->
  <circle cx="32" cy="44" r="2.8" fill="#c46d2e"/>

  <!-- ── Wordmark: stacked caps with generous tracking ── -->

  <!-- THIEN -->
  <text x="74" y="26"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="17" font-weight="700"
        fill="#1c1917"
        letter-spacing="5.5">THIEN</text>

  <!-- Hairline rule between the two halves -->
  <line x1="74" y1="33.5" x2="196" y2="33.5"
        stroke="#d6d3d1" stroke-width="0.75"/>

  <!-- GLISH — accent orange, same weight, echoes the mark's color -->
  <text x="74" y="51"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="17" font-weight="700"
        fill="#c46d2e"
        letter-spacing="5.5">GLISH</text>

  <!-- Sub-label in micro type, widely tracked -->
  <text x="75" y="61"
        font-family="Georgia, serif"
        font-size="6.5" font-weight="400"
        fill="#a8a29e"
        letter-spacing="3.8"
        font-style="italic">english learning</text>

</svg>
