<svg width="240" height="64" viewBox="0 0 240 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- ── LogoMark: 3D V-Book with AI Sparkle (Centered at x=32, y=32) ── -->
  <g transform="translate(10, 10) scale(1.833)">
    <!-- 3D cover slab under the pages -->
    <path
      d="M4 16 L4 18.5 L12 21.5 L20 18.5 L20 16 L12 19 Z"
      fill="#000000"
      stroke="#000000"
      stroke-width="2.5"
      stroke-linejoin="round"
    />
    <!-- Left Page (White) -->
    <path
      d="M4 6 L12 9 L12 19 L4 16 Z"
      fill="#FFFFFF"
      stroke="#000000"
      stroke-width="2.5"
      stroke-linejoin="round"
    />
    <!-- Right Page (Gold Accent) -->
    <path
      d="M20 6 L12 9 L12 19 L20 16 Z"
      fill="#FFB800"
      stroke="#000000"
      stroke-width="2.5"
      stroke-linejoin="round"
    />
    <!-- Left Page Text Lines -->
    <path
      d="M6.5 11 L9.5 12.125 M6.5 13.5 L9.5 14.625"
      stroke="#000000"
      stroke-width="1.2"
      stroke-linecap="round"
      opacity="0.8"
    />
    <!-- Right Page Text Lines -->
    <path
      d="M14.5 12.125 L17.5 11 M14.5 14.625 L17.5 13.5"
      stroke="#000000"
      stroke-width="1.2"
      stroke-linecap="round"
      opacity="0.8"
    />
    <!-- Center Spine Crease -->
    <path
      d="M12 9 V19"
      stroke="#000000"
      stroke-width="1.2"
      stroke-linecap="round"
    />
    <!-- Floating Sparkle (AI Spark) -->
    <path
      d="M12 1.5 Q12 3.8 14.3 3.8 Q12 3.8 12 6.1 Q12 3.8 9.7 3.8 Q12 3.8 12 1.5 Z"
      fill="#000000"
    />
  </g>

  <!-- ── Wordmark: Stacked brand title with heavy font-weight ── -->
  <text
    x="74"
    y="32"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="20"
    font-weight="900"
    letter-spacing="-0.03em"
    fill="#000000"
  >
    TOEIC<tspan fill="#FFB800"> Master</tspan>
  </text>
  <text
    x="75"
    y="47"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="9.5"
    font-weight="700"
    letter-spacing="0.16em"
    fill="#666666"
  >
    AI STUDY HUB
  </text>
</svg>
